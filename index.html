<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Shifter 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        #video-container { position: absolute; bottom: 10px; right: 10px; width: 120px; height: 90px; border-radius: 10px; overflow: hidden; transform: scaleX(-1); border: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #controls { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle, #222, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { padding: 15px 30px; font-size: 1.2rem; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>ZAM ZAM SHAPE MORPHER</h1>
        <p>Hath ki movement se shapes badal jayengi</p>
        <button id="btn">START ENGINE</button>
    </div>

    <div id="controls">
        <h2 id="shape-name">Current Shape: Random Cloud</h2>
        <p>Pinch: Morph Shape | Move: Rotate & Pull</p>
    </div>

    <div id="video-container"><video id="vid" playsinline></video></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const video = document.getElementById('vid');
        const startBtn = document.getElementById('btn');
        const shapeLabel = document.getElementById('shape-name');

        // --- 1. THREE.JS SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        camera.position.z = 15;

        const count = 10000;
        const geometry = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        const targetPos = new Float32Array(count * 3); // Shape Target coordinates

        for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 20;
        geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));

        const mat = new THREE.PointsMaterial({ size: 0.06, color: 0x00d2ff, transparent: true, blending: THREE.AdditiveBlending });
        const points = new THREE.Points(geometry, mat);
        scene.add(points);

        // --- 2. SHAPE GENERATORS ---
        function setHeart() {
            shapeLabel.innerText = "Shape: Heart";
            for (let i = 0; i < count; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                targetPos[i*3] = x / 1.5;
                targetPos[i*3+1] = y / 1.5;
                targetPos[i*3+2] = (Math.random() - 0.5) * 2;
            }
        }

        function setSphere() {
            shapeLabel.innerText = "Shape: Sphere";
            for (let i = 0; i < count; i++) {
                const u = Math.random() * Math.PI * 2;
                const v = Math.random() * Math.PI;
                targetPos[i*3] = 10 * Math.sin(v) * Math.cos(u);
                targetPos[i*3+1] = 10 * Math.sin(v) * Math.sin(u);
                targetPos[i*3+2] = 10 * Math.cos(v);
            }
        }

        function setBox() {
            shapeLabel.innerText = "Shape: 3D Cube";
            for (let i = 0; i < count; i++) {
                targetPos[i*3] = (Math.random() - 0.5) * 15;
                targetPos[i*3+1] = (Math.random() - 0.5) * 15;
                targetPos[i*3+2] = (Math.random() - 0.5) * 15;
            }
        }

        setSphere(); // Default shape

        // --- 3. HAND TRACKING & LOGIC ---
        let hX = 0, hY = 0, currentShapeIdx = 0;
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });

        hands.onResults((res) => {
            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                const lm = res.multiHandLandmarks[0];
                hX = (lm[8].x - 0.5) * -30;
                hY = (lm[8].y - 0.5) * -20;

                // Detect Pinch to change shape
                const dist = Math.sqrt(Math.pow(lm[8].x - lm[4].x, 2) + Math.pow(lm[8].y - lm[4].y, 2));
                if(dist < 0.04) {
                    currentShapeIdx = (currentShapeIdx + 1) % 3;
                    if(currentShapeIdx == 0) setSphere();
                    if(currentShapeIdx == 1) setHeart();
                    if(currentShapeIdx == 2) setBox();
                }
            }
        });

        startBtn.onclick = async () => {
            document.getElementById('start-screen').style.display = 'none';
            const cam = new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 });
            cam.start();
        };

        // --- 4. ANIMATION & MORPHING ---
        function animate() {
            requestAnimationFrame(animate);
            const currentPos = geometry.attributes.position.array;

            for(let i=0; i<count*3; i++) {
                // Morphing logic: Move current position towards target position
                currentPos[i] += (targetPos[i] - currentPos[i]) * 0.05;
            }

            // Follow hand rotation
            points.rotation.x += (hY * 0.01 - points.rotation.x) * 0.1;
            points.rotation.y += (hX * 0.01 - points.rotation.y) * 0.1;

            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
